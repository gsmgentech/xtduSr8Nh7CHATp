<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
        }

        .error {
            text-align: center;
            margin-top: 25px;
            font-weight: bold;
            font-size: 80px;
            color: #DE3163;
            animation: blinker 1s linear infinite;
        }

        .errormessage {
            text-align: center;
            margin-top: -80px;
            color: #DE3163;
        }

        @keyframes blinker {
            50% {
                opacity: 0;
            }
        }
    </style>
    <script>
        // Redirect to another page after 2 seconds (2000 milliseconds)
        setTimeout(function() {
            window.location.href = "https://gsmgentech.github.io/xtduSr8Nh7CHATp/";
        }, 2000);
    </script>
</head>
<body>
    <div>
        <p class="error"><strong>ERROR</strong></p>
        <p class="errormessage"><strong>Ensure that you are connected to<br>the internet</strong></p>
    </div>
</body>
</html>
