<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="css/style.css">
    <title>IMEI</title>
    <style>
    </style>
</head>
<body> 
    <img class="gentech-image" src="img/gentechserver.png">
    <nav>
        <div class="nav">
            <a class="navbt active" href="">IMEI</a>
            <a class="navbt" href="rent/rent.html">RENT</a>
            <a class="navbt" href="server.html">SERVER</a>
            <a class="navbt" href="remote.html">REMOTE</a>
        </div>        
    </nav>

    <div class="box">
        <input type="text" id="search-box" placeholder="sᴇᴀʀᴄʜ" onkeyup="searchButtons()">
        <div id="buttons-container"></div>
    </div>

    <script>
        const buttonsData = [
            { label: 'VIVO IT ADMIN REMOVE', href: '', imgSrc: 'img/gentechserver.png' },
            { label: 'SAMSUNG FRP REMOVE BY IMEI/SN', href: '', imgSrc: 'img/gentechserver.png' },
            { label: 'HONOR FRP KEY', href: '', imgSrc: 'img/gentechserver.png' },
            { label: 'HONOR NETWORK UNLOCK', href: '', imgSrc: 'img/gentechserver.png' },
            { label: 'NOTHING PHONE UNLOCK', href: '', imgSrc: 'img/gentechserver.png' },
            { label: 'SMD NO SIGNAL BYPASS (5S TO X)', href: '', imgSrc: 'img/gentechserver.png' },
            { label: 'IPAD FMI OFF', href: '', imgSrc: 'img/gentechserver.png' },
            { label: 'APPLE ID OWNER INFO', href: '', imgSrc: 'img/gentechserver.png' },
            { label: 'TECNO INFINIX ITEM MDM', href: '', imgSrc: 'img/gentechserver.png' },
            { label: 'ITEL NETWORK UNLOCK CODE VIA IMEI', href: '', imgSrc: 'img/gentechserver.png' },
        ];
    
        const itemsPerPage = 20;
        let currentPage = 1;
        let filteredData = [...buttonsData]; // A copy of the original data for filtering
    
        function displayButtons() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = currentPage * itemsPerPage;
            const buttonsContainer = document.getElementById('buttons-container');
            buttonsContainer.innerHTML = '';
    
            filteredData.slice(start, end).forEach(button => {
                const btnElement = document.createElement('a');
                btnElement.className = 'button';
                btnElement.href = button.href;
    
                // Create the image element
                const imgElement = document.createElement('img');
                imgElement.src = button.imgSrc; // Set image source from button data
                imgElement.alt = button.label; // Alt text for the image
                imgElement.className = 'button-icon'; // Optional class for styling
    
                // Create a span for the label
                const labelSpan = document.createElement('span');
                labelSpan.textContent = button.label;
    
                // Add the image and label to the button
                btnElement.appendChild(imgElement);
                btnElement.appendChild(labelSpan);
    
                buttonsContainer.appendChild(btnElement);
            });
        }
    
        function searchButtons() {
            const searchTerm = document.getElementById('search-box').value.toLowerCase();
            filteredData = buttonsData.filter(button => button.label.toLowerCase().includes(searchTerm));
            currentPage = 1; // Reset to the first page on search
            displayButtons();
        }
    
        // Initial load
        displayButtons();
    </script>  
</body>
</html>
