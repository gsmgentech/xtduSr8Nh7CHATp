<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="../../css/style.css">
    <title>UNLOCK TOOL</title>
</head>
<body> 
    <img class="gentech-image" src="../../img/gentechserver.png">

    <nav>
        <div class="nav">
            <a class="navbt" href="../../index.html">IMEI</a>
            <a class="navbt active" href="">RENT</a>
            <a class="navbt" href="../../server.html">SERVER</a>
            <a class="navbt" href="../../remote.html">REMOTE</a>
        </div>   
    </nav>

    <div class="box">
        <a class="name" style="margin-top: -15px;">UNLOCKTOOL RENT OPTIONS</a>

        <div id="buttons-container"></div>

        <a class="back" href="javascript:history.back()">BACK</a>
    </div>

    <script>
        const buttonsData = [
            { label: '6 HOURS ₱200', href: '6hours/paymentopions.html', imgSrc: '../../img/gentechserver.png' },
            { label: '8 HOURS ₱250', href: '8hours/paymentopions.html', imgSrc: '../../img/gentechserver.png' },
            { label: '12 HOURS ₱350', href: '12hours/paymentopions.html', imgSrc: '../../img/gentechserver.png' },
            { label: '24 HOURS ₱450', href: '24hours/paymentopions.html', imgSrc: '../../img/gentechserver.png' },   
        ];
    
        const itemsPerPage = 200;
        let currentPage = 1;
        let filteredData = [...buttonsData];

        function displayButtons() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = currentPage * itemsPerPage;
            const buttonsContainer = document.getElementById('buttons-container');
            buttonsContainer.innerHTML = '';

            filteredData.slice(start, end).forEach(button => {
                const btnElement = document.createElement('a');
                btnElement.className = 'button';
                btnElement.href = button.href;

                const imgElement = document.createElement('img');
                imgElement.src = button.imgSrc;
                imgElement.alt = button.label;
                imgElement.className = 'button-icon';

                const labelSpan = document.createElement('span');
                labelSpan.textContent = button.label;

                btnElement.appendChild(imgElement);
                btnElement.appendChild(labelSpan);

                buttonsContainer.appendChild(btnElement);
            });  
        }

        function searchButtons() {
            const searchTerm = document.getElementById('search-box').value.toLowerCase();
            filteredData = buttonsData.filter(button => button.label.toLowerCase().includes(searchTerm));
            currentPage = 1;
            displayButtons();
        }

        displayButtons();
    </script>    
</body>
</html>
